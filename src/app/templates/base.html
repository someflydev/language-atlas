<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Atlas</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <header>
        <nav class="navbar border-b border-slate-100 shadow-none py-6">
            <div class="container flex flex-wrap items-center justify-between gap-8">
                <div class="flex items-center gap-6">
                    <a href="/" class="logo no-underline hover:text-blue-600 transition-colors">Language Atlas</a>
                    <a href="/odysseys" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Odysseys</a>
                    <a href="/visualizations" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Visualizations</a>
                </div>
                
                <div class="flex-grow max-w-2xl relative" id="search-container">
                    <input type="text" 
                           name="q" 
                           placeholder="Search languages, creators, or deep profile content..." 
                           class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold text-slate-900 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none placeholder:text-slate-400"
                           hx-get="/search" 
                           hx-trigger="keyup changed delay:250ms" 
                           hx-target="#search-results"
                           hx-swap="innerHTML"
                           hx-indicator="#search-indicator"
                           autocomplete="off">
                    
                    <div id="search-indicator" class="htmx-indicator absolute right-6 top-1/2 -translate-y-1/2">
                        <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>

                    <div id="search-results"></div>
                </div>

                <script>
                    document.addEventListener('click', function(e) {
                        const searchContainer = document.getElementById('search-container');
                        const searchResults = document.getElementById('search-results');
                        if (!searchContainer.contains(e.target)) {
                            searchResults.innerHTML = '';
                        }
                    });

                    document.addEventListener('keydown', function(e) {
                        if (e.key === 'Escape') {
                            document.getElementById('search-results').innerHTML = '';
                        }
                    });
                </script>
            </div>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2024 Language Atlas - Exploring the Evolution of Computing</p>
        </div>
    </footer>
</body>
</html>
