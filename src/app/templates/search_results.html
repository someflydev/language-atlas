{% if results %}
<div class="absolute top-full left-0 right-0 z-50 mt-2 bg-white rounded-xl shadow-2xl border border-slate-200 max-h-[70vh] overflow-y-auto overflow-x-hidden p-2">
    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 px-4 py-2 border-bottom border-slate-50">
        Search Results ({{ results|length }})
    </div>
    {% for result in results %}
    <a href="/language/{{ result.link_name }}" 
       class="block p-4 hover:bg-slate-50 rounded-lg transition-colors border-b border-slate-50 last:border-0 group">
        <div class="flex justify-between items-start mb-1">
            <span class="text-sm font-bold text-slate-900 group-hover:text-blue-600 transition-colors">
                {{ result.title }}
            </span>
            <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded {% if result.category == 'language' %}bg-blue-50 text-blue-600{% else %}bg-amber-50 text-amber-600{% endif %}">
                {{ result.category }}
            </span>
        </div>
        <p class="text-xs text-slate-500 line-clamp-2 leading-relaxed">
            ...{{ result.snippet|safe }}...
        </p>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="absolute top-full left-0 right-0 z-50 mt-2 bg-white rounded-xl shadow-2xl border border-slate-200 p-8 text-center">
    <p class="text-sm font-bold text-slate-400">No matches found for "{{ query }}"</p>
</div>
{% endif %}
